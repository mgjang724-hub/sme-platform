<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="design_doc_mode" content="canvas">
<title>SME Script Platform — 전체 화면 모아보기</title>
<link rel="stylesheet" href="tokens.css">
<style>
  body{margin:0;background:#EEF0F3;font-family:var(--font-sans);color:var(--fg-1)}
  a{color:var(--primary);text-decoration:none}
  header.top{padding:34px 40px 8px}
  .brandrow{display:flex;align-items:center;gap:14px}
  .brandrow img{height:30px}
  h1{font-family:var(--font-display);font-size:26px;font-weight:700;margin:14px 0 4px}
  .sub{font-size:14px;color:var(--fg-3);max-width:760px;line-height:1.6}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px}
  .lg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--fg-2)}
  .lg span.d{width:9px;height:9px;border-radius:50%}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:28px;padding:24px 40px 60px}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden;display:flex;flex-direction:column}
  .cap{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border)}
  .num{width:30px;height:30px;flex:none;border-radius:8px;background:var(--primary-tint);color:var(--primary-hover);display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;font-family:var(--font-num)}
  .cap .t{font-size:15px;font-weight:700}
  .cap .r{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:.03em;padding:4px 9px;border-radius:6px}
  .cap .open{margin-left:8px;font-size:12px;font-weight:700;color:var(--fg-4);display:inline-flex;align-items:center;gap:4px}
  .frame{position:relative;width:100%;height:390px;overflow:hidden;background:var(--bg-page)}
  .frame iframe{position:absolute;top:0;left:0;border:0;transform-origin:top left}
  .roleP{background:var(--primary-tint);color:var(--primary-hover)}
  .roleS{background:#E8F1FB;color:#245C92}
  .roleB{background:var(--bg-sunken);color:var(--fg-3)}
</style>
</head>
<body>
<header class="top">
  <div class="brandrow"><img src="assets/logo-iscream-full.png" alt="i-Scream"><span style="font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--primary)">SME Script Platform</span></div>
  <h1>강사 소통 플랫폼 — 전체 화면 와이어프레임</h1>
  <div class="sub">기획자(PLANNER)와 강사(SME)의 원고 소통 전용 제품. 18개 화면을 한눈에 보고, 각 카드를 클릭하면 실제 화면으로 이동합니다. 상태칩 5색 · 코랄 1차 컬러 · 좌측 고정 사이드바 체계.</div>
  <div class="legend">
    <span class="lg"><span class="d" style="background:#9CA3AF"></span>대기</span>
    <span class="lg"><span class="d" style="background:#3B82F6"></span>진행중</span>
    <span class="lg"><span class="d" style="background:#F59E0B"></span>검수중</span>
    <span class="lg"><span class="d" style="background:#EF4444"></span>수정요청</span>
    <span class="lg"><span class="d" style="background:#10B981"></span>승인/확정</span>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
  var SCREENS = [
    { n:"01", t:"로그인",              role:"B", file:"S01-Login.dc.html" },
    { n:"02", t:"기획자 홈",           role:"P", file:"S02-PlannerHome.dc.html" },
    { n:"03", t:"내 작업 목록",        role:"S", file:"S03-MyTasks.dc.html" },
    { n:"04", t:"과정 목록",           role:"P", file:"S04-CourseList.dc.html" },
    { n:"07", t:"원고 상세관리 & 소통 ★", role:"PS", file:"S07-ScriptManage.dc.html" },
    { n:"09", t:"안내센터 홈",         role:"PS", file:"S09-GuideCenter.dc.html" },
    { n:"10", t:"안내 상세 페이지",     role:"PS", file:"S10-GuideDetail.dc.html" },
    { n:"06", t:"과정 상세현황 · 로드맵", role:"PS", file:"S06-CourseDetail.dc.html" },
    { n:"05", t:"과정 생성 위저드",     role:"P", file:"S05-CourseWizard.dc.html" },
    { n:"08", t:"참여자 · 권한",        role:"P", file:"S08-Members.dc.html" },
    { n:"11", t:"안내 관리 (CMS)",      role:"P", file:"S11-GuideManage.dc.html" },
    { n:"12", t:"검수 목록 (통합 큐)",   role:"P", file:"S12-ReviewQueue.dc.html" },
    { n:"13", t:"문의함",              role:"PS", file:"S13-Inbox.dc.html" },
    { n:"14", t:"알림 패널",            role:"PS", file:"S14-Notifications.dc.html" },
    { n:"15", t:"일정 · 마감 캘린더",    role:"PS", file:"S15-Calendar.dc.html" },
    { n:"16", t:"강사 상세 · 워크로드",   role:"P", file:"S16-SmeDetail.dc.html" },
    { n:"17", t:"강사 참여 과정 목록",    role:"S", file:"S17-MyCourses.dc.html" },
    { n:"18", t:"설정",               role:"PS", file:"S18-Settings.dc.html" },
  ];
  var ROLE = {
    P:  { cls:"roleP", label:"PLANNER" },
    S:  { cls:"roleS", label:"SME" },
    PS: { cls:"roleP", label:"공통" },
    B:  { cls:"roleB", label:"진입" },
  };
  var VW = 1440, VH = 900;      // virtual render size per screen
  var grid = document.getElementById("grid");
  SCREENS.forEach(function(s){
    var card = document.createElement("div");
    card.className = "card";
    var r = ROLE[s.role];
    card.innerHTML =
      '<div class="cap">' +
        '<span class="num">'+s.n+'</span>' +
        '<span class="t">'+s.t+'</span>' +
        '<span class="r '+r.cls+'">'+r.label+'</span>' +
        '<a class="open" href="'+s.file+'" target="_blank">열기 ↗</a>' +
      '</div>' +
      '<div class="frame"><iframe src="'+s.file+'" scrolling="no" loading="lazy"></iframe></div>';
    grid.appendChild(card);
    var frame = card.querySelector(".frame");
    var iframe = card.querySelector("iframe");
    iframe.style.width = VW + "px";
    iframe.style.height = VH + "px";
    function fit(){
      var scale = frame.clientWidth / VW;
      iframe.style.transform = "scale(" + scale + ")";
      iframe.style.height = (frame.clientHeight / scale) + "px";
    }
    fit();
    window.addEventListener("resize", fit);
    // make the whole card clickable
    card.querySelector(".cap").addEventListener("click", function(e){
      if(e.target.tagName === "A") return;
      window.open(s.file, "_blank");
    });
    card.querySelector(".cap").style.cursor = "pointer";
  });
</script>
</body>
</html>
