<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="tokens.css">
  <script src="icons.js"></script>
  <style>
    body{margin:0}
    a{color:var(--primary);text-decoration:none}
    a:hover{color:var(--primary-hover)}
    input{font-family:var(--font-sans)}
    .qrow:hover{background:var(--bg-sunken)}
    .qrow:hover .goact{background:var(--primary-hover)}
    .kpi:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong)}
  </style>
</helmet>
<div style="display:flex;height:100vh;overflow:hidden;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-1)">
  <dc-import name="AppSidebar" role="PLANNER" active="review" hint-size="240px,100%"></dc-import>
  <main style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden">

    <header style="flex:none;height:66px;padding:0 32px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:18px">
      <div style="flex:1;min-width:0"><div style="font-family:var(--font-display);font-size:20px;font-weight:700">검수</div></div>
      <div style="display:flex;align-items:center;gap:8px;height:40px;padding:0 12px;width:260px;border:1px solid var(--border-strong);border-radius:var(--r-md);background:var(--bg-card)">
        <x-ic name="search" s="17" style="color:var(--fg-4)"></x-ic>
        <input placeholder="원고·과정·강사 검색" style="flex:1;border:none;outline:none;background:none;font-size:13.5px">
      </div>
      <a href="S14-Notifications.dc.html" style="position:relative;width:40px;height:40px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-card);display:inline-flex;align-items:center;justify-content:center" style-hover="border-color:var(--border-strong)">
        <x-ic name="bell" s="18" style="color:var(--fg-2)"></x-ic>
        <span style="position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--primary)"></span>
      </a>
    </header>

    <div style="flex:1;overflow-y:auto;padding:26px 32px 40px">

      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px">
        <div>
          <div style="font-family:var(--font-display);font-size:24px;font-weight:700">검수 대기 원고 <span style="color:var(--primary)">4건</span></div>
          <div style="font-size:13px;color:var(--fg-3);margin-top:4px">강사가 제출한 새 버전을 과정과 상관없이 한 곳에서 검수해요</div>
        </div>
      </div>

      <!-- summary -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
        <div class="kpi" style="position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:18px 20px;transition:box-shadow .15s,border-color .15s">
          <div style="display:flex;align-items:center;gap:8px;color:var(--warning-fg)"><x-ic name="clipboard-check" s="17"></x-ic><span style="font-size:12.5px;font-weight:700">검수 대기</span></div>
          <div style="font-family:var(--font-num);font-size:30px;font-weight:700;margin-top:8px">4<span style="font-size:14px;color:var(--fg-3);font-weight:600;margin-left:3px">건</span></div>
        </div>
        <div class="kpi" style="position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:18px 20px;transition:box-shadow .15s,border-color .15s">
          <div style="display:flex;align-items:center;gap:8px;color:var(--error-fg)"><x-ic name="alert-triangle" s="17"></x-ic><span style="font-size:12.5px;font-weight:700">마감 임박·초과</span></div>
          <div style="font-family:var(--font-num);font-size:30px;font-weight:700;margin-top:8px">2<span style="font-size:14px;color:var(--fg-3);font-weight:600;margin-left:3px">건</span></div>
        </div>
        <div class="kpi" style="position:relative;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);padding:18px 20px;transition:box-shadow .15s,border-color .15s">
          <div style="display:flex;align-items:center;gap:8px;color:var(--fg-3)"><x-ic name="clock" s="17"></x-ic><span style="font-size:12.5px;font-weight:700">평균 대기</span></div>
          <div style="font-family:var(--font-num);font-size:30px;font-weight:700;margin-top:8px">1.3<span style="font-size:14px;color:var(--fg-3);font-weight:600;margin-left:3px">일</span></div>
        </div>
      </div>

      <!-- filter chips -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
          <button style="padding:8px 15px;border-radius:999px;border:{{ f.border }};background:{{ f.bg }};color:{{ f.fg }};font-size:13px;font-weight:{{ f.weight }};cursor:pointer" style-hover="border-color:var(--primary)">{{ f.label }}</button>
        </sc-for>
        <div style="flex:1"></div>
        <button style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-md);border:1px solid var(--border-strong);background:var(--bg-card);color:var(--fg-2);font-size:13px;font-weight:700;cursor:pointer" style-hover="border-color:var(--primary);color:var(--primary-hover)"><x-ic name="filter" s="15"></x-ic> 정렬: 마감순</button>
      </div>

      <!-- queue table -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-md);overflow:hidden">
        <div style="display:flex;align-items:center;gap:16px;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--bg-page-2);font-size:11.5px;font-weight:700;color:var(--fg-4);letter-spacing:.02em">
          <span style="flex:1;min-width:0">원고 · 과정</span>
          <span style="width:118px;flex:none">강사</span>
          <span style="width:60px;flex:none;text-align:center">버전</span>
          <span style="width:120px;flex:none">제출</span>
          <span style="width:110px;flex:none;text-align:right">마감</span>
          <span style="width:118px;flex:none"></span>
        </div>
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="4">
          <a href="S07-ScriptManage.dc.html" class="qrow" style="display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background .12s">
            <span style="width:40px;height:40px;flex:none;border-radius:var(--r-md);background:{{ r.iconBg }};display:inline-flex;align-items:center;justify-content:center;color:{{ r.iconFg }}"><x-ic name="file-text" s="19"></x-ic></span>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:14.5px;font-weight:700;color:var(--fg-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.title }}</span>
                <sc-if value="{{ r.flag }}" hint-placeholder-val="{{ false }}"><span style="font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:999px;background:var(--error-bg);color:var(--error-fg);flex:none">{{ r.flag }}</span></sc-if>
              </div>
              <div style="font-size:12.5px;color:var(--fg-3);margin-top:3px">{{ r.course }}</div>
            </div>
            <div style="width:118px;flex:none;display:flex;align-items:center;gap:8px">
              <span style="width:26px;height:26px;border-radius:50%;flex:none;background:{{ r.avBg }};color:{{ r.avFg }};display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">{{ r.avInit }}</span>
              <span style="font-size:12.5px;color:var(--fg-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.sme }}</span>
            </div>
            <span style="width:60px;flex:none;text-align:center;font-family:var(--font-num);font-size:13px;font-weight:800;color:var(--primary-hover)">{{ r.version }}</span>
            <span style="width:120px;flex:none;font-size:12.5px;color:var(--fg-3)">{{ r.submitted }}</span>
            <span style="width:110px;flex:none;text-align:right;font-size:12.5px;font-weight:{{ r.dueWeight }};color:{{ r.dueColor }}">{{ r.due }}</span>
            <span class="goact" style="width:118px;flex:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-radius:var(--r-md);background:var(--primary);color:#fff;font-size:13px;font-weight:700;transition:background .12s">검수 시작 <x-ic name="arrow-right" s="15"></x-ic></span>
          </a>
        </sc-for>
        <div style="padding:16px 22px;text-align:center;font-size:12.5px;color:var(--fg-4)">최근 30일 검수 완료 12건 · <a href="S04-CourseList.dc.html" style="font-weight:700">과정별로 보기 →</a></div>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount(){try{localStorage.setItem("cdh-role","PLANNER")}catch(e){}}
  renderVals() {
    const chip = (label, on) => ({
      label,
      bg: on ? "var(--fg-1)" : "var(--bg-card)",
      fg: on ? "#fff" : "var(--fg-2)",
      border: on ? "none" : "1px solid var(--border-strong)",
      weight: on ? 700 : 600,
    });
    return {
      filters: [ chip("전체 4", true), chip("직장 내 괴롭힘 예방 2", false), chip("성희롱 예방 교육 1", false), chip("개인정보보호 실무 1", false) ],
      rows: [
        { title: "3차시 — 역할극 시나리오 원고", course: "직장 내 괴롭힘 예방", sme: "이서연", avInit: "이", avBg: "#D5E3F2", avFg: "#245C92", version: "v2", submitted: "3시간 전", due: "오늘 마감", dueColor: "var(--error-fg)", dueWeight: 800, flag: "마감 임박", iconBg: "var(--error-bg)", iconFg: "var(--error-fg)" },
        { title: "5차시 — 사례 분석 대본", course: "직장 내 괴롭힘 예방", sme: "박도현", avInit: "박", avBg: "#E0D6F5", avFg: "#5B45A8", version: "v1", submitted: "어제 17:20", due: "내일", dueColor: "var(--fg-2)", dueWeight: 600, flag: "", iconBg: "var(--warning-bg)", iconFg: "var(--warning-fg)" },
        { title: "1차시 — 오프닝 스크립트", course: "개인정보보호 실무", sme: "최민아", avInit: "최", avBg: "#CFE6E2", avFg: "#1E7E73", version: "v1", submitted: "어제 09:05", due: "7.10 (금)", dueColor: "var(--fg-2)", dueWeight: 600, flag: "", iconBg: "var(--warning-bg)", iconFg: "var(--warning-fg)" },
        { title: "2차시 — 개념 정리 원고", course: "성희롱 예방 교육", sme: "이서연", avInit: "이", avBg: "#D5E3F2", avFg: "#245C92", version: "v3", submitted: "2일 전", due: "7.6 초과", dueColor: "var(--error-fg)", dueWeight: 800, flag: "재검수", iconBg: "var(--warning-bg)", iconFg: "var(--warning-fg)" },
      ],
    };
  }
}
</script>
</body>
</html>
