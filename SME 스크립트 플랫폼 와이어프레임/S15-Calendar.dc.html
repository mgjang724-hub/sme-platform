<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="tokens.css">
  <script src="icons.js"></script>
  <style>
    body{margin:0}
    a{color:var(--primary);text-decoration:none}
    a:hover{color:var(--primary-hover)}
    .day:hover{background:var(--bg-page-2)}
    .evt:hover{filter:brightness(.97)}
    .up:hover{background:var(--bg-sunken)}
  </style>
</helmet>
<div style="display:flex;height:100vh;overflow:hidden;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-1)">
  <dc-import name="AppSidebar" role="{{ sidebarRole }}" active="calendar" hint-size="240px,100%"></dc-import>
  <main style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden">

    <header style="flex:none;height:66px;padding:0 32px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px">
      <div style="flex:1;min-width:0"><div style="font-family:var(--font-display);font-size:20px;font-weight:700">일정 · 마감 캘린더</div></div>
      <div style="display:flex;align-items:center;gap:6px;padding:4px;border-radius:999px;background:var(--bg-sunken)">
        <button onClick="{{ setPlanner }}" style="padding:6px 13px;border:none;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;background:{{ plannerBtnBg }};color:{{ plannerBtnFg }}">기획자</button>
        <button onClick="{{ setSme }}" style="padding:6px 13px;border:none;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;background:{{ smeBtnBg }};color:{{ smeBtnFg }}">강사</button>
      </div>
      <a href="S14-Notifications.dc.html" style="position:relative;width:40px;height:40px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-card);display:inline-flex;align-items:center;justify-content:center" style-hover="border-color:var(--border-strong)">
        <x-ic name="bell" s="18" style="color:var(--fg-2)"></x-ic>
        <span style="position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--primary)"></span>
      </a>
    </header>

    <div style="flex:1;display:flex;min-height:0;overflow:hidden">

      <!-- calendar -->
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;padding:22px 26px 26px">
        <!-- month nav + legend -->
        <div style="flex:none;display:flex;align-items:center;gap:14px;margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:4px">
            <button style="width:34px;height:34px;border:1px solid var(--border-strong);border-radius:var(--r-md);background:var(--bg-card);display:inline-flex;align-items:center;justify-content:center;cursor:pointer" style-hover="border-color:var(--primary);color:var(--primary-hover)"><x-ic name="chevron-left" s="17"></x-ic></button>
            <div style="font-family:var(--font-display);font-size:18px;font-weight:700;min-width:118px;text-align:center">2026년 7월</div>
            <button style="width:34px;height:34px;border:1px solid var(--border-strong);border-radius:var(--r-md);background:var(--bg-card);display:inline-flex;align-items:center;justify-content:center;cursor:pointer" style-hover="border-color:var(--primary);color:var(--primary-hover)"><x-ic name="chevron-right" s="17"></x-ic></button>
          </div>
          <button style="padding:7px 13px;border:1px solid var(--border-strong);border-radius:var(--r-md);background:var(--bg-card);color:var(--fg-2);font-size:12.5px;font-weight:700;cursor:pointer" style-hover="border-color:var(--primary);color:var(--primary-hover)">오늘</button>
          <div style="flex:1"></div>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
            <sc-for list="{{ legend }}" as="l" hint-placeholder-count="4">
              <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--fg-2)"><span style="width:9px;height:9px;border-radius:3px;background:{{ l.color }}"></span>{{ l.label }}</span>
            </sc-for>
          </div>
        </div>

        <!-- grid -->
        <div style="flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-md);overflow:hidden">
          <div style="flex:none;display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
            <sc-for list="{{ dows }}" as="d" hint-placeholder-count="7">
              <div style="padding:10px 0;text-align:center;font-size:12px;font-weight:700;color:{{ d.color }}">{{ d.label }}</div>
            </sc-for>
          </div>
          <div style="flex:1;min-height:0;display:grid;grid-template-rows:repeat(5,1fr)">
            <sc-for list="{{ weeks }}" as="w" hint-placeholder-count="5">
              <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)">
                <sc-for list="{{ w.days }}" as="d" hint-placeholder-count="7">
                  <div class="day" style="border-right:1px solid var(--border);padding:6px 7px;min-width:0;overflow:hidden;background:{{ d.cellBg }};transition:background .12s">
                    <div style="display:flex;justify-content:flex-end">
                      <span style="display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 5px;border-radius:999px;font-family:var(--font-num);font-size:12px;font-weight:{{ d.numWeight }};background:{{ d.numBg }};color:{{ d.numFg }}">{{ d.num }}</span>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:3px;margin-top:3px">
                      <sc-for list="{{ d.events }}" as="e" hint-placeholder-count="0">
                        <div class="evt" style="display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:5px;background:{{ e.bg }};border-left:3px solid {{ e.bar }};cursor:pointer">
                          <span style="font-size:10.5px;font-weight:700;color:{{ e.fg }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ e.label }}</span>
                        </div>
                      </sc-for>
                    </div>
                  </div>
                </sc-for>
              </div>
            </sc-for>
          </div>
        </div>
      </div>

      <!-- upcoming panel -->
      <div style="width:320px;flex:none;border-left:1px solid var(--border);background:var(--bg-card);display:flex;flex-direction:column;min-height:0">
        <div style="flex:none;padding:18px 20px 12px;border-bottom:1px solid var(--border)">
          <div style="font-family:var(--font-display);font-size:16px;font-weight:700">다가오는 일정</div>
          <div style="font-size:12px;color:var(--fg-4);margin-top:2px">{{ upcomingSub }}</div>
        </div>
        <div style="flex:1;overflow-y:auto;padding:8px 12px 20px">
          <sc-for list="{{ upcoming }}" as="u" hint-placeholder-count="6">
            <a href="{{ u.href }}" class="up" style="display:flex;gap:13px;padding:13px 10px;border-radius:var(--r-md);text-decoration:none;color:inherit;transition:background .12s">
              <div style="width:46px;flex:none;text-align:center">
                <div style="font-family:var(--font-num);font-size:19px;font-weight:800;color:{{ u.dateFg }};line-height:1.1">{{ u.day }}</div>
                <div style="font-size:10.5px;color:var(--fg-4);font-weight:700">{{ u.dow }}</div>
              </div>
              <div style="flex:1;min-width:0;border-left:1px solid var(--border);padding-left:13px">
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="width:8px;height:8px;border-radius:3px;flex:none;background:{{ u.bar }}"></span>
                  <span style="font-size:13px;font-weight:700;color:var(--fg-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ u.title }}</span>
                </div>
                <div style="font-size:12px;color:var(--fg-3);margin-top:3px">{{ u.meta }}</div>
                <span style="display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;background:{{ u.ddBg }};color:{{ u.ddFg }}">{{ u.dday }}</span>
              </div>
            </a>
          </sc-for>
        </div>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  __pr(r){try{localStorage.setItem("cdh-role",r)}catch(e){}return r;}
  state = { role: (function(){try{return localStorage.getItem("cdh-role")||"PLANNER";}catch(e){return "PLANNER";}})() };

  renderVals() {
    const isPlanner = this.state.role === "PLANNER";
    const seg = on => ({ bg: on ? "var(--bg-card)" : "transparent", fg: on ? "var(--primary-hover)" : "var(--fg-3)" });
    const p = seg(isPlanner), s = seg(!isPlanner);
    const TODAY = 8;

    // event types
    const TY = {
      due:   { bar: "var(--primary)",        bg: "var(--primary-tint)",    fg: "var(--primary-hover)" },
      review:{ bar: "var(--info)",           bg: "var(--info-bg)",         fg: "var(--info-fg)" },
      film:  { bar: "var(--stage-film-fg)",  bg: "var(--stage-film-bg)",   fg: "var(--stage-film-fg)" },
      final: { bar: "var(--success)",        bg: "var(--success-bg)",      fg: "var(--success-fg)" },
      over:  { bar: "var(--error)",          bg: "var(--error-bg)",        fg: "var(--error-fg)" },
    };
    const legend = [
      { label: "제출 마감", color: "var(--primary)" },
      { label: "검수 마감", color: "var(--info)" },
      { label: "최종 확정", color: "var(--success)" },
      { label: "촬영", color: "var(--stage-film-fg)" },
    ];

    // events keyed by july day
    const plannerEv = [
      { d: 6,  ty: "over",   label: "성희롱 2차시 마감 초과", title: "성희롱 예방 · 2차시 제출 마감", meta: "박도현 강사 · 초과", href: "S12-ReviewQueue.dc.html" },
      { d: 9,  ty: "due",    label: "괴롭힘 3차시 제출", title: "괴롭힘 예방 · 3차시 제출 마감", meta: "이서연 강사", href: "S07-ScriptManage.dc.html" },
      { d: 10, ty: "review", label: "개인정보 1차시 검수", title: "개인정보보호 · 1차시 검수 마감", meta: "최민아 강사", href: "S12-ReviewQueue.dc.html" },
      { d: 12, ty: "due",    label: "괴롭힘 2차시 제출", title: "괴롭힘 예방 · 2차시 제출 마감", meta: "박도현 강사", href: "S07-ScriptManage.dc.html" },
      { d: 15, ty: "due",    label: "괴롭힘 4차시 제출", title: "괴롭힘 예방 · 4차시 제출 마감", meta: "박도현 강사", href: "S07-ScriptManage.dc.html" },
      { d: 16, ty: "due",    label: "괴롭힘 5차시 제출", title: "괴롭힘 예방 · 5차시 제출 마감", meta: "이서연 강사", href: "S07-ScriptManage.dc.html" },
      { d: 20, ty: "due",    label: "괴롭힘 전체 마감", title: "괴롭힘 예방 · 원고 전체 제출 마감", meta: "6차시 전체", href: "S06-CourseDetail.dc.html" },
      { d: 25, ty: "final",  label: "괴롭힘 최종 확정", title: "괴롭힘 예방 · 최종본 확정", meta: "전체 차시", href: "S06-CourseDetail.dc.html" },
      { d: 28, ty: "film",   label: "🎬 스튜디오 촬영", title: "괴롭힘 예방 · 스튜디오 촬영", meta: "스튜디오 A · 전 차시", href: "S06-CourseDetail.dc.html" },
      { d: 30, ty: "film",   label: "🎬 3차시 역할극", title: "3차시 역할극 별도 촬영", meta: "스튜디오 B · 출연 2인", href: "S10-GuideDetail.dc.html" },
    ];
    const smeEv = [
      { d: 9,  ty: "due",    label: "3차시 원고 제출", title: "괴롭힘 예방 · 3차시 제출 마감", meta: "역할극 시나리오", href: "S07-ScriptManage.dc.html" },
      { d: 16, ty: "due",    label: "5차시 원고 제출", title: "괴롭힘 예방 · 5차시 제출 마감", meta: "사례 분석 2", href: "S07-ScriptManage.dc.html" },
      { d: 25, ty: "final",  label: "최종 확정", title: "담당 원고 최종본 확정", meta: "1·3·5차시", href: "S03-MyTasks.dc.html" },
      { d: 30, ty: "film",   label: "🎬 3차시 역할극", title: "3차시 역할극 촬영", meta: "스튜디오 B · 출연 2인", href: "S10-GuideDetail.dc.html" },
    ];
    const evs = isPlanner ? plannerEv : smeEv;
    const byDay = {};
    evs.forEach(e => { (byDay[e.d] = byDay[e.d] || []).push({ ...e, ...TY[e.ty] }); });

    // grid: first cell = Sun Jun 28. July 1 is Wednesday (offset 3)
    const cells = [];
    for (let i = 0; i < 35; i++) {
      const jd = i - 2; // july day number at cell i (cell 3 -> 1)
      const inMonth = jd >= 1 && jd <= 31;
      const num = inMonth ? jd : (jd < 1 ? 30 + jd : jd - 31);
      const today = inMonth && jd === TODAY;
      const dow = i % 7;
      cells.push({
        num,
        events: inMonth ? (byDay[jd] || []) : [],
        cellBg: today ? "var(--primary-tint-2)" : (inMonth ? "var(--bg-card)" : "var(--bg-page-2)"),
        numWeight: today ? 800 : (inMonth ? 600 : 400),
        numBg: today ? "var(--primary)" : "transparent",
        numFg: today ? "#fff" : (inMonth ? (dow === 0 ? "var(--error-fg)" : "var(--fg-2)") : "var(--fg-4)"),
      });
    }
    const weeks = [0,1,2,3,4].map(r => ({ days: cells.slice(r*7, r*7+7) }));

    const DOWK = ["일","월","화","수","목","금","토"];
    const dows = DOWK.map((label, i) => ({ label, color: i === 0 ? "var(--error-fg)" : "var(--fg-3)" }));

    // upcoming: events with day >= today, sorted
    const upcoming = evs.filter(e => e.d >= TODAY).sort((a,b) => a.d - b.d).map(e => {
      const t = TY[e.ty];
      const dd = e.d - TODAY;
      const ddText = dd === 0 ? "D-DAY" : "D-" + dd;
      const urgent = dd <= 3;
      const dowIdx = (2 + e.d) % 7; // july 1 is Wed(3); cell math: dow of day jd = (jd+2)%7
      return {
        day: e.d, dow: DOWK[(e.d + 2) % 7], title: e.title, meta: e.meta, href: e.href,
        bar: t.bar, dateFg: urgent ? "var(--primary-hover)" : "var(--fg-1)",
        dday: ddText,
        ddBg: urgent ? "var(--primary-tint)" : "var(--bg-sunken)",
        ddFg: urgent ? "var(--primary-hover)" : "var(--fg-3)",
      };
    });

    return {
      sidebarRole: this.state.role,
      setPlanner: () => this.setState({ role: this.__pr("PLANNER") }),
      setSme: () => this.setState({ role: this.__pr("SME") }),
      plannerBtnBg: p.bg, plannerBtnFg: p.fg, smeBtnBg: s.bg, smeBtnFg: s.fg,
      legend, dows, weeks, upcoming,
      upcomingSub: "오늘(7.8) 이후 " + upcoming.length + "건",
    };
  }
}
</script>
</body>
</html>
