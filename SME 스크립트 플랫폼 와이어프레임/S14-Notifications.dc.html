<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="tokens.css">
  <script src="icons.js"></script>
  <style>
    body{margin:0}
    a{color:var(--primary);text-decoration:none}
    a:hover{color:var(--primary-hover)}
    .noti:hover{background:var(--bg-sunken)}
    .noti:hover .goto{opacity:1}
  </style>
</helmet>
<div style="display:flex;height:100vh;overflow:hidden;background:var(--bg-page);font-family:var(--font-sans);color:var(--fg-1)">
  <dc-import name="AppSidebar" role="{{ sidebarRole }}" active="{{ sidebarActive }}" hint-size="240px,100%"></dc-import>
  <main style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden">

    <header style="flex:none;height:66px;padding:0 32px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px">
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px">
        <div style="font-family:var(--font-display);font-size:20px;font-weight:700">알림</div>
        <span style="font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:999px;background:var(--primary-tint);color:var(--primary-hover)">새 알림 {{ unreadCount }}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding:4px;border-radius:999px;background:var(--bg-sunken)">
        <button onClick="{{ setPlanner }}" style="padding:6px 13px;border:none;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;background:{{ plannerBtnBg }};color:{{ plannerBtnFg }}">기획자</button>
        <button onClick="{{ setSme }}" style="padding:6px 13px;border:none;border-radius:999px;font-size:12.5px;font-weight:700;cursor:pointer;background:{{ smeBtnBg }};color:{{ smeBtnFg }}">강사</button>
      </div>
      <button onClick="{{ markAll }}" style="display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--border-strong);border-radius:var(--r-md);background:var(--bg-card);color:var(--fg-2);font-size:13px;font-weight:700;cursor:pointer" style-hover="border-color:var(--primary);color:var(--primary-hover)"><x-ic name="check" s="15"></x-ic> 모두 읽음</button>
    </header>

    <div style="flex:1;overflow-y:auto;padding:24px 32px 48px">
      <div style="max-width:820px;margin:0 auto">

        <!-- filter tabs -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap">
          <sc-for list="{{ filters }}" as="f" hint-placeholder-count="5">
            <button onClick="{{ f.select }}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:{{ f.border }};background:{{ f.bg }};color:{{ f.fg }};font-size:13px;font-weight:{{ f.weight }};cursor:pointer" style-hover="border-color:var(--primary)"><sc-if value="{{ f.icon }}" hint-placeholder-val="{{ false }}"><x-ic name="{{ f.icon }}" s="14"></x-ic></sc-if>{{ f.label }}</button>
          </sc-for>
        </div>

        <sc-for list="{{ groups }}" as="g" hint-placeholder-count="2">
          <div style="margin-bottom:26px">
            <div style="font-size:12.5px;font-weight:700;color:var(--fg-4);margin-bottom:10px;padding-left:2px">{{ g.label }}</div>
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-sm);overflow:hidden">
              <sc-for list="{{ g.items }}" as="n" hint-placeholder-count="3">
                <a href="{{ n.href }}" class="noti" style="display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;background:{{ n.rowBg }};transition:background .12s">
                  <span style="width:40px;height:40px;flex:none;border-radius:var(--r-md);background:{{ n.iconBg }};color:{{ n.iconFg }};display:inline-flex;align-items:center;justify-content:center"><x-ic name="{{ n.icon }}" s="19"></x-ic></span>
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:center;gap:8px">
                      <span style="font-size:14px;font-weight:700;color:var(--fg-1)">{{ n.title }}</span>
                      <sc-if value="{{ n.unread }}" hint-placeholder-val="{{ false }}"><span style="width:7px;height:7px;border-radius:50%;background:var(--primary);flex:none"></span></sc-if>
                      <span style="margin-left:auto;font-size:11.5px;color:var(--fg-4);flex:none">{{ n.time }}</span>
                    </div>
                    <div style="font-size:13px;color:var(--fg-3);margin-top:4px;line-height:1.6">{{ n.desc }}</div>
                    <div style="display:flex;align-items:center;gap:8px;margin-top:9px">
                      <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:{{ n.tagBg }};color:{{ n.tagFg }}"><x-ic name="{{ n.tagIcon }}" s="12"></x-ic>{{ n.tag }}</span>
                      <span class="goto" style="font-size:12px;font-weight:700;color:var(--primary-hover);display:inline-flex;align-items:center;gap:4px;opacity:.55;transition:opacity .12s">{{ n.cta }} <x-ic name="arrow-right" s="13"></x-ic></span>
                    </div>
                  </div>
                </a>
              </sc-for>
            </div>
          </div>
        </sc-for>

        <div style="text-align:center;padding:8px 0;font-size:12.5px;color:var(--fg-4)">지난 알림은 30일간 보관돼요</div>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  __pr(r){try{localStorage.setItem("cdh-role",r)}catch(e){}return r;}
  state = { role: (function(){try{return localStorage.getItem("cdh-role")||"PLANNER";}catch(e){return "PLANNER";}})(), filter: "all", read: {} };

  markAll() {
    const all = {};
    this.data().forEach(n => { all[n.id] = true; });
    this.setState({ read: all });
  }

  data() {
    const isPlanner = this.state.role === "PLANNER";
    const T = {
      feedback: { icon: "message-square", iconBg: "var(--info-bg)", iconFg: "var(--info-fg)", tag: "피드백", tagIcon: "message-square", tagBg: "var(--info-bg)", tagFg: "var(--info-fg)" },
      status:   { icon: "flag", iconBg: "var(--primary-tint)", iconFg: "var(--primary-hover)", tag: "상태 변경", tagIcon: "circle-dot", tagBg: "var(--primary-tint)", tagFg: "var(--primary-hover)" },
      deadline: { icon: "alert-triangle", iconBg: "var(--error-bg)", iconFg: "var(--error-fg)", tag: "마감", tagIcon: "clock", tagBg: "var(--error-bg)", tagFg: "var(--error-fg)" },
      inquiry:  { icon: "help-circle", iconBg: "var(--warning-bg)", iconFg: "var(--warning-fg)", tag: "문의", tagIcon: "help-circle", tagBg: "var(--warning-bg)", tagFg: "var(--warning-fg)" },
    };
    const P = [
      { id:"p1", kind:"feedback", group:"today", title:"이서연 강사가 새 버전을 제출했어요", desc:"직장 내 괴롭힘 예방 · 3차시 역할극 시나리오 v2 — 검수를 기다리고 있어요.", time:"3시간 전", cta:"검수하러 가기", href:"S07-ScriptManage.dc.html" },
      { id:"p2", kind:"inquiry", group:"today", title:"새 문의가 도착했어요", desc:"이서연 강사 — “3차시 역할극 촬영 일정 문의” 답변을 기다리고 있어요.", time:"1시간 전", cta:"답변하기", href:"S13-Inbox.dc.html" },
      { id:"p3", kind:"deadline", group:"today", title:"마감이 초과됐어요", desc:"성희롱 예방 교육 · 2차시 원고가 7.6 마감을 초과했어요.", time:"오늘 09:00", cta:"과정 보기", href:"S06-CourseDetail.dc.html" },
      { id:"p4", kind:"status", group:"week", title:"박도현 강사가 문의를 남겼어요", desc:"“원고 분량 기준이 궁금해요” — 원고 작성 가이드 관련 질문이에요.", time:"어제", cta:"문의함 열기", href:"S13-Inbox.dc.html" },
      { id:"p5", kind:"feedback", group:"week", title:"강사가 피드백에 답글을 달았어요", desc:"개인정보보호 실무 · 1차시 — 최민아 강사가 수정요청에 회신했어요.", time:"2일 전", cta:"스레드 보기", href:"S07-ScriptManage.dc.html" },
      { id:"p6", kind:"status", group:"week", title:"과정 상태가 변경됐어요", desc:"장애인 인식개선 과정의 모든 차시가 최종확정 되었어요. 🎉", time:"3일 전", cta:"과정 보기", href:"S06-CourseDetail.dc.html" },
    ];
    const S = [
      { id:"s1", kind:"feedback", group:"today", title:"기획자가 피드백을 남겼어요", desc:"3차시 역할극 시나리오 v2 — “인트로 톤을 조금 더 부드럽게” 수정 요청이 있어요.", time:"1시간 전", cta:"확인하기", href:"S07-ScriptManage.dc.html" },
      { id:"s2", kind:"inquiry", group:"today", title:"문의 답변이 도착했어요", desc:"“Google Docs 링크 제출 방법” 에 대한 기획자 답변을 확인해 보세요.", time:"어제", cta:"답변 보기", href:"S13-Inbox.dc.html" },
      { id:"s3", kind:"deadline", group:"today", title:"제출 마감이 임박했어요", desc:"직장 내 괴롭힘 예방 · 3차시 원고 마감이 오늘까지예요.", time:"오늘 08:00", cta:"작업 열기", href:"S03-MyTasks.dc.html" },
      { id:"s4", kind:"status", group:"week", title:"원고가 승인됐어요", desc:"직장 내 괴롭힘 예방 · 1차시 오프닝이 최종확정 되었어요.", time:"2일 전", cta:"내 작업 보기", href:"S03-MyTasks.dc.html" },
      { id:"s5", kind:"status", group:"week", title:"새 안내가 등록됐어요", desc:"‘촬영 안내’ 문서에 이 과정 특이사항이 추가됐어요.", time:"4일 전", cta:"안내 보기", href:"S10-GuideDetail.dc.html" },
    ];
    return (isPlanner ? P : S).map(n => ({ ...n, ...T[n.kind] }));
  }

  renderVals() {
    const isPlanner = this.state.role === "PLANNER";
    const seg = on => ({ bg: on ? "var(--bg-card)" : "transparent", fg: on ? "var(--primary-hover)" : "var(--fg-3)" });
    const p = seg(isPlanner), s = seg(!isPlanner);

    const all = this.data();
    const isRead = id => !!this.state.read[id];
    const unreadCount = all.filter(n => !isRead(n.id)).length;

    const flt = this.state.filter;
    const shown = all.filter(n => flt === "all" || n.kind === flt);

    const mkGroup = (key, label) => {
      const items = shown.filter(n => n.group === key).map(n => {
        const unread = !isRead(n.id);
        return { ...n, unread, rowBg: unread ? "var(--primary-tint-2)" : "var(--bg-card)" };
      });
      return items.length ? { label, items } : null;
    };
    const groups = [ mkGroup("today", "오늘"), mkGroup("week", "이번 주") ].filter(Boolean);

    const FTYPES = [
      { id: "all", label: "전체", icon: "" },
      { id: "feedback", label: "피드백", icon: "message-square" },
      { id: "status", label: "상태 변경", icon: "circle-dot" },
      { id: "deadline", label: "마감", icon: "clock" },
      { id: "inquiry", label: "문의", icon: "help-circle" },
    ];
    const filters = FTYPES.map(f => {
      const on = flt === f.id;
      return { ...f, select: () => this.setState({ filter: f.id }),
        bg: on ? "var(--fg-1)" : "var(--bg-card)", fg: on ? "#fff" : "var(--fg-2)",
        border: on ? "none" : "1px solid var(--border-strong)", weight: on ? 700 : 600 };
    });

    return {
      sidebarRole: this.state.role,
      sidebarActive: isPlanner ? "dashboard" : "tasks",
      setPlanner: () => this.setState({ role: this.__pr("PLANNER"), filter: "all" }),
      setSme: () => this.setState({ role: this.__pr("SME"), filter: "all" }),
      plannerBtnBg: p.bg, plannerBtnFg: p.fg, smeBtnBg: s.bg, smeBtnFg: s.fg,
      unreadCount, markAll: () => this.markAll(),
      filters, groups,
    };
  }
}
</script>
</body>
</html>
