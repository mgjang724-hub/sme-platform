services:
  - type: web
    name: sme-script-platform
    env: node
    plan: free
    buildCommand: node build_demo.js
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: sme-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: sme-db
    plan: free
